services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gospellens}
      POSTGRES_USER: ${POSTGRES_USER:-gospellens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gospellens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  api:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      - "8000:8000"
    restart: unless-stopped
    command: >
      gunicorn -k uvicorn.workers.UvicornWorker
      -w 4
      -b 0.0.0.0:8000
      app.main:app

  worker:
    build:
      context: ./backend
    env_file:
      - ./.env
    depends_on:
      - db
    restart: unless-stopped
    command: >
      python -m app.worker

volumes:
  pgdata:
