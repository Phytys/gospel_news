services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gospel_resonance}
      POSTGRES_USER: ${POSTGRES_USER:-gospel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gospel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5432 is often taken by a local Postgres; override with POSTGRES_PUBLISH_PORT in .env
      - "${POSTGRES_PUBLISH_PORT:-5433}:5432"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - ./.env
    depends_on:
      - db
    ports:
      # On hosts where 8000 is taken (e.g. another app), set API_PUBLISH_PORT=8010 in .env
      - "${API_PUBLISH_PORT:-8000}:8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ./.env
    depends_on:
      - db
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        # Baked at `next build`. Empty = browser uses /api on same host (production). Set in .env for local API port.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
